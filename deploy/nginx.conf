# ═══════════════════════════════════════════════════════
# SIGA180 — Nginx config for Hetzner CX22
# Copy to: /etc/nginx/sites-available/siga180
# Then: ln -s /etc/nginx/sites-available/siga180 /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════

# Rate limiting zone: 10 req/s per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Upstream Next.js cluster
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS (certbot will modify this)
server {
    listen 80;
    listen [::]:80;
    server_name siga180.pt www.siga180.pt;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.siga180.pt;

    ssl_certificate /etc/letsencrypt/live/siga180.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siga180.pt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://siga180.pt$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name siga180.pt;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/siga180.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siga180.pt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy — managed by Next.js (next.config.ts) to avoid duplicate headers
    # Do NOT add CSP here; Nginx add_header creates a second header that causes browser conflicts

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # ── Client settings ──
    client_max_body_size 10M;

    # ── Static files (Next.js) ──
    location /_next/static {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public assets ──
    location /public {
        alias /var/www/siga180/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── API rate limiting ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Main reverse proxy ──
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Block dotfiles ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Favicon fallback ──
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ── Robots.txt ──
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    access_log /var/log/nginx/siga180.access.log;
    error_log /var/log/nginx/siga180.error.log;
}
