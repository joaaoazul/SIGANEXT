name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      JWT_SECRET: "ci-test-secret-not-for-production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint || true

      - name: Run tests
        run: npx vitest run

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      JWT_SECRET: "ci-test-secret-not-for-production"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
